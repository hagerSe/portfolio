<body>
 <class="form-container">
    <h1>User Information Form</h1>
    <form id="userForm" onsubmit="return validateForm()">
      <!-- Name -->
      <label for="name">Full Name:</label>
      <input type="text" id="name" placeholder="First Last" required><br>

      <!-- Birth Date -->
      <label for="birthDate">Birth Date:</label>
      <input type="date" id="birthDate" required><br>

      <!-- Phone Number -->
      <label for="phone">Phone Number (10 digits):</label>
      <input type="text" id="phone" placeholder="1234567890" required><br>

      <!-- Email -->
      <label for="email">Email Address:</label>
      <input type="email" id="email" placeholder="name@domain.com" required><br>

      <!-- Message -->
      <label for="message">Message:</label>
      <textarea id="message" placeholder="Enter your message" rows="4" required></textarea><br>

      <!-- Security Question -->
      <label for="security">What is the last name of the current president?</label>
      <input type="text" id="security" placeholder="Last Name" required><br>

      <!-- Submit Button -->
      <button type="submit">Submit</button>
    </form>

    <!-- Confirmation Page -->
    <div id="confirmationPage" style="display: none;">
      <h2>Confirm Your Information</h2>
      <p id="confirmName"></p>
      <p id="confirmBirthDate"></p>
      <p id="confirmPhone"></p>
      <p id="confirmEmail"></p>
      <p id="confirmMessage"></p>
      <button onclick="confirmSubmit()">Confirm</button>
      <button onclick="editForm()">Edit</button>
    </div>
